<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nolan Young professional software engineering portfolio: web platforms, APIs, automation, AI workflows, analytics, and technical systems ownership."
    />
    <title>Nolan Young | Full-Stack Software Developer</title>
    <script>
      try {
        const savedTheme = localStorage.getItem('nolan-portfolio-theme')
        document.documentElement.dataset.theme = savedTheme === 'light' ? 'light' : 'dark'
      } catch {
        document.documentElement.dataset.theme = 'dark'
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
